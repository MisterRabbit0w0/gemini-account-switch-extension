name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate extension (manifest / 引用文件 / JS 语法 / 远程脚本)
        run: npm run validate

      - name: Unit tests
        run: npm test
